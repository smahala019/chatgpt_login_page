<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/019/514/650/small_2x/letter-s-logo-design-for-business-and-company-identity-with-luxury-concept-free-vector.jpg" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 1s ease-in-out;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      max-width: 100px;
      height: auto;
      margin: 0 auto 1rem;
      border-radius: 30px;
    }

    h2 {
      margin-bottom: 1rem;
      color: #333;
    }

    label {
      font-weight: 500;
      display: block;
      margin-bottom: 0.5rem;
      color: #444;
      text-align: left;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: #6a82fb;
      outline: none;
    }

    .captcha-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    #captchaCanvas {
      width: 220px;
      height: 50px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .refresh-btn {
      padding: 0.5rem 0.7rem;
      font-size: 1.9rem;
      border: none;
      background:#0a0a23; 
      color: white;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background: #0a0a23;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button:hover {
      background: #5b73e8;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid white;
      border-top: 3px solid #6a82fb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: green;
      display: none;
    }

    .error {
      color: red;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      text-align: left;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.5rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      #captchaCanvas {
        width: 140px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/019/514/650/small_2x/letter-s-logo-design-for-business-and-company-identity-with-luxury-concept-free-vector.jpg" alt="Logo" class="logo" />
    <h2>Forgot Password</h2>
    <form id="forgotForm">
      <input type="text" id="identifier" name="identifier" placeholder="Enter email or mobile number" required />
      <div class="error" id="error"></div>

      <div class="captcha-box">
        <canvas id="captchaCanvas" width="220" height="60"></canvas>
        <button type="button" class="refresh-btn" onclick="generateCaptcha()"aria-label="Refresh CAPTCHA"> <i class="fas fa-arrows-rotate" style="margin-right: 6px;"></i></button>
      </div>
      <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required />

      <button type="submit" id="submitBtn" disabled>
        <span id="btnText">Reset Password</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="message" id="message">Password reset link sent!</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const input = document.getElementById('identifier');
    const captchaInput = document.getElementById('captchaInput');
    const errorDiv = document.getElementById('error');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    let generatedCaptcha = '';

    function validateEmail(email) {
      const re = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/i;
      return re.test(email);
    }

    function validateMobile(value) {
      value = value.replace(/\s/g, '');
      if (value.startsWith('+91')) {
        value = value.slice(3);
      }
      return /^[6-9]\d{9}$/.test(value);
    }

    function formatMobileInput(value) {
      value = value.replace(/\s/g, '');
      if (value.startsWith('+91') && value.length > 3) {
        return '+91 ' + value.slice(3, 13);
      }
      return value;
    }

    input.addEventListener('input', () => {
      const val = input.value.trim();
      const isLikelyMobile = /^\+?91\s?\d{0,10}$/.test(val.replace(/\s/g, '')) || /^[6-9]\d{0,9}$/.test(val);
      if (isLikelyMobile) {
        let value = val.replace(/\s/g, '');
        if (value.startsWith('+91')) {
          value = '+91 ' + value.slice(3, 13);
        } else {
          value = value.slice(0, 10);
        }
        input.value = value;
      }
      checkFormValidity();
    });

    input.addEventListener('blur', () => {
      const val = input.value.trim();
      const isEmail = validateEmail(val);
      const isMobile = validateMobile(val);
      if (!isEmail && !isMobile) {
        errorDiv.textContent = /^\+?\d+$/.test(val.replace(/\s/g, ''))
          ? 'Please enter a correct Indian mobile number.'
          : 'Please enter a correct email address.';
        errorDiv.style.display = 'block';
      } else {
        errorDiv.style.display = 'none';
      }
    });

    captchaInput.addEventListener('input', checkFormValidity);
    captchaInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
    }
  });
    function checkFormValidity() {
      const val = input.value.trim();
      const captchaVal = captchaInput.value.trim();
      const isEmail = validateEmail(val);
      const isMobile = validateMobile(val);
      // submitBtn.disabled = !(captchaVal.length === 6 && (isEmail || isMobile));
      if (captchaVal.length === 6 && (isEmail || isMobile)) {
    submitBtn.disabled = false;
  } else {
    submitBtn.disabled = true;
  }
}

    function showSpinner(show) {
      spinner.style.display = show ? 'inline-block' : 'none';
      btnText.textContent = show ? 'Resetting...' : 'Reset Password';
    }

    
  function generateCaptcha() {
    const canvas = document.getElementById('captchaCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    generatedCaptcha = '';
    for (let i = 0; i < 6; i++) {
      const char = chars.charAt(Math.floor(Math.random() * chars.length));
      generatedCaptcha += char;
      const angle = (Math.random() - 0.5) * 0.5;
      ctx.save();
      ctx.translate(30 * i + 20, 40);
      ctx.rotate(angle);
      ctx.font = 'bold 30px Segoe UI';
      ctx.fillStyle = '#111';
      ctx.fillText(char, 0, 0);
      ctx.restore();
    }

    for (let i = 0; i < 5; i++) {
      ctx.strokeStyle = '#999';
      ctx.beginPath();
      ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
      ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
      ctx.stroke();
    }

    for (let i = 0; i < 40; i++) {
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1.2, 0, 2 * Math.PI);
      ctx.fill();
    }
  }

    generateCaptcha();

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let value = input.value.trim();
      const captchaVal = captchaInput.value.trim();
      errorDiv.style.display = 'none';
      messageDiv.style.display = 'none';

      value = formatMobileInput(value);
      input.value = value;

      const isEmail = validateEmail(value);
      const isMobile = validateMobile(value);

      if (!isEmail && !isMobile) {
        errorDiv.textContent = /^\+?\d+$/.test(value.replace(/\s/g, ''))
          ? 'Please enter a correct Indian mobile number.'
          : 'Please enter a correct email address.';
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        return;
      }

      if (captchaVal !== generatedCaptcha) {
        errorDiv.textContent = 'CAPTCHA does not match. Please try again.';
        errorDiv.style.display = 'block';
        generateCaptcha();
        submitBtn.disabled = false;
        return;
      }

      submitBtn.disabled = true;
      showSpinner(true);

      setTimeout(() => {
        messageDiv.style.display = 'block';
        messageDiv.style.opacity = 0;
        messageDiv.style.transition = 'opacity 0.5s ease-in-out';
        setTimeout(() => messageDiv.style.opacity = 1, 100);

        form.reset();
        generateCaptcha();
        showSpinner(false);
        btnText.textContent = 'Reset Password';
        submitBtn.disabled = true;

        setTimeout(() => {
          messageDiv.style.opacity = 0;
          setTimeout(() => {
            messageDiv.style.display = 'none';
          }, 500);
        }, 4000);
      }, 2000);
    });
  </script>
</body>
</html>
